---
- name: Deploy Antonlabs Root CA
  hosts: all
  become: true

  vars:
    ca_cert_src: "files/antonlabs-rootCA.crt"
    ca_cert_name: "antonlabs-rootCA.crt"

  tasks:

    - name: Copy CA cert (Debian/Ubuntu)
      copy:
        src: "{{ ca_cert_src }}"
        dest: "/usr/local/share/ca-certificates/{{ ca_cert_name }}"
        owner: root
        group: root
        mode: '0644'
      when: ansible_os_family == "Debian"

    - name: Update CA trust (Debian/Ubuntu)
      command: update-ca-certificates
      when: ansible_os_family == "Debian"

    - name: Copy CA cert (RHEL)
      copy:
        src: "{{ ca_cert_src }}"
        dest: "/etc/pki/ca-trust/source/anchors/{{ ca_cert_name }}"
        owner: root
        group: root
        mode: '0644'
      when: ansible_os_family == "RedHat"

    - name: Update CA trust (RHEL)
      command: update-ca-trust
      when: ansible_os_family == "RedHat"